repos:
  - repo: https://github.com/kynan/nbstripout
    rev: 0.9.1
    hooks:
      - id: nbstripout
        args: [--drop-empty-cells, --strip-init-cells]

  - repo: https://github.com/nbQA-dev/nbQA
    rev: 1.9.1
    hooks:
      - id: nbqa-isort
        args: [--profile=black, --line-length=88]
      - id: nbqa-black
        args: [--line-length=88]
      # nbqa-flake8 omitted — tutorial notebooks are auto-converted from
      # OpenCV docs; linting them produces noise rather than value.
